  assemblies:
  - X12Net
  namespace: X12Net.Validation
  summary: >-
    Validates the raw 271 EDI interchange text and returns a combined result

    containing both structural and EB element-level errors.
  example: []
  syntax:
    content: public static X12ValidationResult Validate(string input)
    parameters:
    - id: input
      type: System.String
      description: Raw EDI X12 interchange text for a 271 transaction.
    return:
      type: X12Net.Validation.X12ValidationResult
      description: >-
        An <xref href="X12Net.Validation.X12ValidationResult" data-throw-if-not-resolved="false"></xref> whose <xref href="X12Net.Validation.X12ValidationResult.Errors" data-throw-if-not-resolved="false"></xref>

        list combines all structural errors (from <xref href="X12Net.Validation.X12Validator" data-throw-if-not-resolved="false"></xref>) followed by

        all EB element errors (from <xref href="X12Net.Validation.EbSegmentValidator" data-throw-if-not-resolved="false"></xref>), one entry per

        failing element per EB segment.
    content.vb: Public Shared Function Validate(input As String) As X12ValidationResult
