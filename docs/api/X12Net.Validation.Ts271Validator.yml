  assemblies:
  - X12Net
  namespace: X12Net.Validation
  summary: >-
    Validates a 271 Health Care Eligibility/Benefit Response interchange by

    combining interchange-level structural checks (<xref href="X12Net.Validation.X12Validator" data-throw-if-not-resolved="false"></xref>)

    with EB segment element-level semantic checks (<xref href="X12Net.Validation.EbSegmentValidator" data-throw-if-not-resolved="false"></xref>).

    Neither existing class is modified.
  remarks: >-
    Validation runs in two phases:


    <ol><li>
        <xref href="X12Net.Validation.X12Validator.Validate(System.String%2cSystem.Collections.Generic.IEnumerable%7bX12Net.Validation.X12ValidationRule%7d%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> is called first. If a required envelope
        segment (ISA or IEA) is missing the reader cannot safely scan the body, so
        the structural errors are returned immediately without running phase 2.
      </li><li>
        Every EB segment in the interchange is passed to
        <xref href="X12Net.Validation.EbSegmentValidator.Validate(X12Net.Core.X12Segment)" data-throw-if-not-resolved="false"></xref>. All resulting errors are appended
        to the structural error list before the combined result is returned.
      </li></ol>
  example: []
