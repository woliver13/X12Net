  assemblies:
  - X12Net
  namespace: X12Net.Envelopes
  summary: Initializes the builder with envelope identifiers and optional delimiter overrides.
  example: []
  syntax:
    content: public X12InterchangeBuilder(string senderId, string receiverId, string date, string time, int interchangeControlNumber = 1, string senderQualifier = "ZZ", string receiverQualifier = "ZZ", char elementSeparator = '*', char componentSeparator = ':', char segmentTerminator = '~')
    parameters:
    - id: senderId
      type: System.String
      description: ISA06 sender ID (padded to 15 chars).
    - id: receiverId
      type: System.String
      description: ISA08 receiver ID (padded to 15 chars).
    - id: date
      type: System.String
      description: ISA09 date (YYMMDD, 6 chars).
    - id: time
      type: System.String
      description: ISA10 time (HHMM, 4 chars).
    - id: interchangeControlNumber
      type: System.Int32
      description: ISA13 / IEA02 control number (default 1).
    - id: senderQualifier
      type: System.String
      description: ISA05 (default "ZZ").
    - id: receiverQualifier
      type: System.String
      description: ISA07 (default "ZZ").
    - id: elementSeparator
      type: System.Char
      description: ISA element delimiter (default <code>*</code>).
    - id: componentSeparator
      type: System.Char
      description: ISA16 component delimiter (default <code>:</code>).
    - id: segmentTerminator
      type: System.Char
      description: Segment terminator written after every segment (default <code>~</code>).
